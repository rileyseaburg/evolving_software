name: Deploy Evolvere Techne to Kubernetes

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: us-central1-docker.pkg.dev
  IMAGE: us-central1-docker.pkg.dev/spotlessbinco/spotlessbinco/evolveretechne-site
  NAMESPACE: evolveretechne

jobs:
  build-and-deploy:
    runs-on: evolving-software-k8s
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Static TetherScript check
        run: tetherscript inspect --ast server.tether >/tmp/server.ast

      - name: Build image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .

      - name: Push image
        run: |
          set -euo pipefail
          mkdir -p ~/.docker
          if kubectl get secret gcp-artifact-registry -n spotlessbinco >/dev/null 2>&1; then
            kubectl get secret gcp-artifact-registry -n spotlessbinco \
              -o jsonpath='{.data.\\.dockerconfigjson}' | base64 -d > ~/.docker/config.json
          elif [ -n "${{ secrets.REGISTRY_USERNAME }}" ] && [ -n "${{ secrets.REGISTRY_PASSWORD }}" ]; then
            echo '{"auths":{"${{ env.REGISTRY }}":{"auth":"'$(printf '%s:%s' '${{ secrets.REGISTRY_USERNAME }}' '${{ secrets.REGISTRY_PASSWORD }}' | base64 -w0)'"}}}' > ~/.docker/config.json
          else
            echo "::error::No registry credentials available"
            exit 1
          fi

          if command -v skopeo >/dev/null 2>&1; then
            skopeo copy --dest-authfile ~/.docker/config.json docker-daemon:${{ env.IMAGE }}:${{ github.sha }} docker://${{ env.IMAGE }}:${{ github.sha }}
            skopeo copy --dest-authfile ~/.docker/config.json docker-daemon:${{ env.IMAGE }}:latest docker://${{ env.IMAGE }}:latest
          else
            docker login ${{ env.REGISTRY }} --username "$(jq -r '.auths["${{ env.REGISTRY }}"].username // empty' ~/.docker/config.json)" --password-stdin < <(jq -r '.auths["${{ env.REGISTRY }}"].password // empty' ~/.docker/config.json)
            docker push ${{ env.IMAGE }}:${{ github.sha }}
            docker push ${{ env.IMAGE }}:latest
          fi

      - name: Apply namespace and pull secret
        run: |
          kubectl apply -f k8s/namespace.yaml
          if [ -x scripts/sync-registry-pull-secret.sh ]; then
            scripts/sync-registry-pull-secret.sh || \
              kubectl get secret gcp-artifact-registry -n spotlessbinco -o yaml \
              | sed 's/namespace: spotlessbinco/namespace: evolveretechne/' \
              | kubectl apply -f -
          fi

      - name: Deploy app
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl -n ${{ env.NAMESPACE }} set image deployment/evolveretechne site=${{ env.IMAGE }}:${{ github.sha }}
          kubectl -n ${{ env.NAMESPACE }} rollout status deployment/evolveretechne --timeout=300s

      - name: Ensure Cloudflare tunnel route
        run: |
          kubectl apply -f k8s/cloudflared-route.yaml
          kubectl -n cloudflare rollout restart deploy/cloudflared
          kubectl -n cloudflare rollout status deploy/cloudflared --timeout=180s

      - name: Verify service in cluster
        run: |
          kubectl -n ${{ env.NAMESPACE }} run evolveretechne-smoke-${{ github.run_id }} \
            --rm -i --restart=Never --image=curlimages/curl:8.10.1 -- \
            curl -fsS http://evolveretechne.evolveretechne.svc.cluster.local/
