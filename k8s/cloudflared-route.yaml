# Patch for the shared cloudflared tunnel ConfigMap.
# The cluster tunnel routes evolveretechne.com to the in-cluster Service.
# Apply with:
#   kubectl apply -f k8s/cloudflared-route.yaml
#   kubectl -n cloudflare rollout restart deploy/cloudflared
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflare
data:
  config.yaml: |
    tunnel: dc7f7221-95ad-4cfb-b679-b3473cef4f1c
    credentials-file: /etc/cloudflared/credentials.json
    ingress:
    - hostname: ci.quantum-forge.net
      service: http://192.168.50.85:8080
    - hostname: vault.spotlessbinco.com
      service: https://ingress-nginx-controller.ingress-nginx.svc.cluster.local:443
      originRequest:
        noTLSVerify: true
    - hostname: auth.quantum-forge.io
      service: https://ingress-nginx-controller.ingress-nginx.svc.cluster.local:443
      originRequest:
        noTLSVerify: true
        httpHostHeader: auth.quantum-forge.io
    - hostname: argocd.quantum-forge.net
      service: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:80
      originRequest:
        httpHostHeader: argocd.quantum-forge.net
    - hostname: dev.spotlessbinco.com
      service: http://spotlessbinco-dev.spotlessbinco-dev.svc.cluster.local:80
    - hostname: api.dev.spotlessbinco.com
      service: http://spotlessbinco-api.spotlessbinco-dev.svc.cluster.local:80
    - hostname: staging.spotlessbinco.com
      service: http://spotlessbinco-staging.spotlessbinco-staging.svc.cluster.local:80
    - hostname: api.staging.spotlessbinco.com
      service: http://spotlessbinco-api.spotlessbinco-staging.svc.cluster.local:80
    - hostname: nominatim.spotlessbinco.com
      service: http://nominatim.spotlessbinco.svc.cluster.local:80
    - hostname: humanoid.quantum-forge.io
      service: http://humanoid-platform.default.svc.cluster.local:80
    - hostname: npm.quantum-forge.io
      service: http://verdaccio.quantum-forge.svc.cluster.local:4873
    - hostname: quantum-forge.codetether.run
      service: http://codetether-marketing.a2a-server.svc.cluster.local:3000
    - hostname: opa.codetether.run
      service: http://opa.a2a-server.svc.cluster.local:8181
    - hostname: voice.quantum-forge.io
      service: http://voice-agent.spotlessbinco.svc.cluster.local:8082
    - hostname: voice-agent.quantum-forge.net
      service: http://voice-agent.spotlessbinco.svc.cluster.local:8082
    - hostname: trade.rileyseaburg.com
      service: http://go-trader.rileyseaburg.svc.cluster.local:8080
    - hostname: tracing.spotlessbinco.com
      service: http://jaeger-query.observability.svc.cluster.local:16686
      originRequest:
        httpHostHeader: tracing.spotlessbinco.com
    - hostname: evolveretechne.com
      service: http://evolveretechne.evolveretechne.svc.cluster.local:80
    - hostname: www.evolveretechne.com
      service: http://evolveretechne.evolveretechne.svc.cluster.local:80
    - service: http_status:404
